name: Build Release

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: macos-26
    env:
      XCODE_VERSION: "26.4"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install just
        run: brew install just

      - name: Build release app
        run: just build-release

      - name: Ad hoc sign release app
        run: codesign --sign - --force --deep "build/output/release/KEXP Menubar.app"

      - name: Stage release app artifact
        run: |
          rm -rf artifact
          mkdir -p artifact
          cp -R "build/output/release/KEXP Menubar.app" "artifact/KEXP Menubar.app"

      - name: Upload release app artifact
        uses: actions/upload-artifact@v4
        with:
          name: kexp-menubar-release-app
          path: artifact/
          if-no-files-found: error
