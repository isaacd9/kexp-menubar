name: Build Release

on:
  push:
    branches:
      - master
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-release:
    runs-on: macos-15
    env:
      XCODE_VERSION: "26.1.1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Log available Xcodes
        run: ls /Applications | grep Xcode || true

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ env.XCODE_VERSION }}

      - name: Log build environment
        run: |
          {
            echo "sw_vers:"
            sw_vers
            echo
            echo "xcode-select -p:"
            xcode-select -p
            echo
            echo "xcodebuild -version:"
            xcodebuild -version
            echo
            echo "xcrun --show-sdk-version:"
            xcrun --show-sdk-version
          } | tee build-environment.txt

      - name: Install just
        run: brew install just

      - name: Build release app
        run: just build-release

      - name: Ad hoc sign release app
        run: codesign --sign - --force --deep "build/output/release/KEXP Menubar.app"

      - name: Stage release app artifact
        run: |
          rm -rf artifact
          mkdir -p artifact
          cp -R "build/output/release/KEXP Menubar.app" "artifact/KEXP Menubar.app"
          cp "build-environment.txt" "artifact/build-environment.txt"

      - name: Upload release app artifact
        uses: actions/upload-artifact@v4
        with:
          name: kexp-menubar-release-app
          path: artifact/
          if-no-files-found: error
